<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cytoscape-euler-wasm — WASM vs JS Layout Comparison</title>
  <link rel="stylesheet" href="demo.css">
  <script src="https://unpkg.com/cytoscape@3.33.1/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/cytoscape-euler@1.2.3/cytoscape-euler.js"></script>
  <script type="module" src="demo.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>cytoscape-euler-wasm</h1>
      <span class="subtitle">WASM vs JS Force-Directed Layout</span>
    </header>

    <!-- Cytoscape canvas + progress overlay -->
    <div class="cy-container">
      <div id="cy"></div>
      <div id="progress-overlay" class="progress-overlay hidden">
        <span id="progress-label" class="progress-label">WASM: computing...</span>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-text" class="progress-text">0%</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <!-- Left: Graph generation -->
      <fieldset class="control-group graph-group">
        <legend>Graph</legend>
        <label>
          Nodes
          <input type="number" id="node-count" value="1000" min="10" max="50000" step="100">
        </label>
        <label>
          Children
          <input type="number" id="min-children" value="5" min="1" max="20" class="narrow-input">
          <span>–</span>
          <input type="number" id="max-children" value="30" min="1" max="50" class="narrow-input">
        </label>
        <button id="btn-generate" class="btn btn-primary">Generate Tree</button>
      </fieldset>

      <!-- Center: Layout params -->
      <fieldset class="control-group layout-group">
        <legend>Layout</legend>
        <label>
          Spring Length
          <input type="number" id="spring-length" value="80" min="10" step="10">
        </label>
        <label>
          Spring Coeff
          <input type="number" id="spring-coeff" value="0.0008" min="0" step="0.0001">
        </label>
        <label>
          Mass
          <input type="number" id="mass" value="4" min="0.1" step="0.5">
        </label>
        <label>
          Gravity
          <input type="number" id="gravity" value="-1.2" step="0.1">
        </label>
        <label>
          Pull
          <input type="number" id="pull" value="0.001" min="0" step="0.001">
        </label>
        <label>
          Drag Coeff
          <input type="number" id="drag-coeff" value="0.02" min="0" step="0.005">
        </label>
        <label>
          Time Step
          <input type="number" id="time-step" value="20" min="1" step="1">
        </label>
        <label>
          Theta (B-H)
          <input type="number" id="theta" value="0.666" min="0" step="0.05">
        </label>
        <label>
          Move Threshold
          <input type="number" id="movement-threshold" value="1" min="0" step="0.5">
        </label>
        <label>
          Max Iterations
          <input type="number" id="max-iterations" value="1000" min="50" step="50">
        </label>
        <label>
          Max Time (ms)
          <input type="number" id="max-sim-time" value="60000" min="500" step="500">
        </label>
      </fieldset>

      <!-- Right: Run controls -->
      <fieldset class="control-group run-group">
        <legend>Run</legend>
        <div class="thread-control">
          <label>
            Threads
            <input type="number" id="thread-count" value="0" min="0" max="16" class="narrow-input">
          </label>
          <span id="thread-hint" class="hint">0 = auto</span>
        </div>
        <div class="btn-row">
          <button id="btn-wasm" class="btn btn-wasm">Run WASM</button>
          <button id="btn-js" class="btn btn-js">Run JS</button>
          <button id="btn-compare" class="btn btn-compare">Compare</button>
        </div>
      </fieldset>
    </div>

    <!-- Results (always visible) -->
    <div id="results" class="results">
      <span id="result-placeholder" class="result-placeholder">Run a layout to see results</span>
      <div id="result-wasm" class="result-row hidden">
        <span class="result-engine">WASM</span>
        <span id="result-wasm-time" class="result-value">—</span>
        <span id="result-wasm-detail" class="result-detail"></span>
      </div>
      <div id="result-js" class="result-row hidden">
        <span class="result-engine">JS</span>
        <span id="result-js-time" class="result-value">—</span>
        <span id="result-js-detail" class="result-detail"></span>
      </div>
      <div id="result-speedup" class="result-row speedup hidden">
        <span class="result-engine">Speedup</span>
        <span id="result-speedup-value" class="result-value">—</span>
      </div>
    </div>
  </div>

</body>
</html>
